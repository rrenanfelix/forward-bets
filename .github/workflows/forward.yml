name: Forward Backtest Pipeline

on:
  schedule:
    # 22:00 BRT = 01:00 UTC (próximo dia) — collect + pick_top10
    - cron: '0 1 * * *'
    # 03:00 BRT = 06:00 UTC — resolve
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo (collect, pick, resolve, all)'
        required: true
        default: 'all'
        type: choice
        options:
          - collect
          - pick
          - resolve
          - all

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 1 * * *" ]; then
              echo "mode=collect_pick" >> $GITHUB_OUTPUT
            else
              echo "mode=resolve" >> $GITHUB_OUTPUT
            fi
          else
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          fi

      - name: Run collect
        if: steps.mode.outputs.mode == 'collect_pick' || steps.mode.outputs.mode == 'collect' || steps.mode.outputs.mode == 'all'
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python forward_pipeline.py collect

      - name: Run pick_top10
        if: steps.mode.outputs.mode == 'collect_pick' || steps.mode.outputs.mode == 'pick' || steps.mode.outputs.mode == 'all'
        run: python pick_top10.py

      - name: Run resolve
        if: steps.mode.outputs.mode == 'resolve' || steps.mode.outputs.mode == 'all'
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python forward_pipeline.py resolve

      - name: Commit & push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add forward_bets.json
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "auto: ${{ steps.mode.outputs.mode }} run $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
