name: Forward Backtest Pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo: collect_pick_notify | resolve_partial | resolve_results | collect | pick | resolve | all'
        required: true
        default: 'all'
        type: string

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Mode
        id: mode
        run: echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT

      - name: Run collect
        if: contains(steps.mode.outputs.mode, 'collect') || steps.mode.outputs.mode == 'all'
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python forward_pipeline.py collect

      - name: Run pick_top10
        if: contains(steps.mode.outputs.mode, 'pick') || steps.mode.outputs.mode == 'all'
        run: python pick_top10.py

      - name: Run resolve
        if: contains(steps.mode.outputs.mode, 'resolve') || steps.mode.outputs.mode == 'all'
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python forward_pipeline.py resolve

      - name: Notify Telegram (picks)
        if: contains(steps.mode.outputs.mode, 'notify') || steps.mode.outputs.mode == 'all'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify_telegram.py picks

      - name: Notify Telegram (parcial)
        if: contains(steps.mode.outputs.mode, 'partial')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify_telegram.py partial

      - name: Notify Telegram (resultados)
        if: contains(steps.mode.outputs.mode, 'results')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify_telegram.py results

      - name: Commit & push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add forward_bets.json
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "auto: ${{ steps.mode.outputs.mode }} run $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
