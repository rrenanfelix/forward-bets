<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<title>Forward Backtest — Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root {
    --bg: #0e1117;
    --panel: #161b22;
    --panel-2: #1c222b;
    --border: #2d333b;
    --txt: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --amber: #d29922;
    --gold: #ffb454;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--txt);
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 12px;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .meta { font-size: 12px; color: var(--muted); }
  .tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .tab {
    background: var(--panel-2);
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    white-space: nowrap;
    transition: all .15s;
  }
  .tab:hover { color: var(--txt); }
  .tab.active { background: var(--accent); color: #0e1117; border-color: var(--accent); }
  .tab.tab-acc { background: var(--panel-2); border-color: var(--gold); color: var(--gold); }
  .tab.tab-acc.active { background: var(--gold); color: #0e1117; border-color: var(--gold); }

  main { padding: 24px 32px; max-width: 1500px; margin: 0 auto; }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .kpi {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .kpi .label { font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: .5px; }
  .kpi .value { font-size: 22px; font-weight: 600; margin-top: 6px; font-variant-numeric: tabular-nums; }
  .kpi .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .v-pos { color: var(--green); }
  .v-neg { color: var(--red); }
  .v-amber { color: var(--amber); }
  .v-gold { color: var(--gold); }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }
  .panel h2 {
    margin: 0 0 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .day-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .day-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .day-card .date { font-size: 13px; font-weight: 600; color: var(--txt); margin-bottom: 8px; text-transform: capitalize; }
  .day-card .row { display: flex; justify-content: space-between; font-size: 12px; padding: 2px 0; }
  .day-card .row span:first-child { color: var(--muted); }
  .day-card .row span:last-child { font-variant-numeric: tabular-nums; color: var(--txt); }
  .day-card .pnl { font-weight: 600; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left;
    padding: 10px 8px;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  tbody tr { border-bottom: 1px solid var(--panel-2); }
  tbody tr:hover { background: var(--panel-2); }
  tbody td { padding: 10px 8px; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; }
  .pill-pending { background: #21262d; color: var(--muted); }
  .pill-won { background: rgba(63,185,80,.15); color: var(--green); }
  .pill-lost { background: rgba(248,81,73,.15); color: var(--red); }
  .star { color: var(--gold); margin-right: 4px; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .filters select, .filters input {
    background: var(--panel-2);
    color: var(--txt);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
  }

  .empty { text-align: center; padding: 30px 20px; color: var(--muted); font-size: 13px; }
  .error { background: rgba(248,81,73,.1); border: 1px solid var(--red); padding: 12px 16px; border-radius: 8px; color: var(--red); }
  code { background: var(--panel-2); padding: 1px 6px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div>
      <h1>📊 Forward Backtest — Top 10 por dia</h1>
      <div class="meta" id="updated">—</div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</header>
<main id="main"><div class="empty">Carregando...</div></main>

<script>
const STAKE = 100;
let allBets = [];
let currentTab = "acc";

const fmtMoney = n => (n >= 0 ? "+" : "") + "R$ " + n.toFixed(2).replace(".", ",");
const fmtMoneyPlain = n => "R$ " + n.toFixed(2).replace(".", ",");
const fmtPct = (n, sign=true) => (sign && n >= 0 ? "+" : "") + (100*n).toFixed(1) + "%";
const fmtOdd = n => n == null ? "—" : n.toFixed(2);
const fmtDate = iso => {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleString("pt-BR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
};
const fmtDayLabel = day => {
  if (!day) return "—";
  const d = new Date(day + "T12:00:00");
  return d.toLocaleDateString("pt-BR", { weekday: "short", day: "2-digit", month: "2-digit" });
};
const cls = n => n == null ? "" : (n > 0 ? "v-pos" : n < 0 ? "v-neg" : "");

function moneyOf(b) {
  if (b.status === "won") return STAKE * (b.odd_entry - 1);
  if (b.status === "lost") return -STAKE;
  return 0;
}

async function load() {
  try {
    const res = await fetch("forward_bets.json?_=" + Date.now());
    if (!res.ok) throw new Error(res.statusText);
    allBets = await res.json();
  } catch (e) {
    document.getElementById("main").innerHTML = `<div class="error">
      Não consegui carregar <code>forward_bets.json</code>.<br>
      Sirva esta pasta com <code>python3 -m http.server 8765</code> e abra
      <code>http://localhost:8765/forward_dashboard.html</code>.<br>
      <small>(${e.message})</small></div>`;
    return;
  }
  document.getElementById("updated").textContent =
    "atualizado " + new Date().toLocaleString("pt-BR") + " · stake fixa R$ " + STAKE;
  renderTabs();
  render();
}

function pickedDays() {
  const ds = new Set(allBets.filter(b => b.is_top10 && b.top10_day).map(b => b.top10_day));
  return [...ds].sort();
}

function renderTabs() {
  const days = pickedDays();
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = `
    <button class="tab tab-acc ${currentTab==='acc'?'active':''}" data-tab="acc">📈 Acumulado</button>
    ${days.map(d => `<button class="tab ${currentTab===d?'active':''}" data-tab="${d}">${fmtDayLabel(d)}</button>`).join("")}
    <button class="tab ${currentTab==='all'?'active':''}" data-tab="all">Todas (${allBets.length})</button>
  `;
  tabs.querySelectorAll(".tab").forEach(t => {
    t.addEventListener("click", () => {
      currentTab = t.dataset.tab;
      renderTabs();
      render();
    });
  });
}

function getViewBets() {
  if (currentTab === "all") return allBets;
  if (currentTab === "acc") return allBets.filter(b => b.is_top10);
  return allBets.filter(b => b.top10_day === currentTab);
}

function viewTitle() {
  if (currentTab === "all") return "Todas as entradas";
  if (currentTab === "acc") return "Acumulado — todas as Top 10";
  return "Top do dia — " + fmtDayLabel(currentTab);
}

function render() {
  const bets = getViewBets();
  const main = document.getElementById("main");
  if (!bets.length) {
    main.innerHTML = `<div class="empty">Sem entradas nessa visão.</div>`;
    return;
  }

  const settled = bets.filter(b => b.status === "won" || b.status === "lost");
  const won = settled.filter(b => b.status === "won").length;
  const lost = settled.filter(b => b.status === "lost").length;
  const pending = bets.filter(b => b.status === "pending").length;
  const pnlMoney = settled.reduce((s, b) => s + moneyOf(b), 0);
  const stakeMoney = settled.length * STAKE;
  const roi = stakeMoney ? pnlMoney / stakeMoney : 0;
  const hit = settled.length ? won / settled.length : 0;
  const totalPlanned = bets.length * STAKE;

  const showDailyHistory = currentTab === "acc";

  main.innerHTML = `
    <h2 style="margin:0 0 16px;font-size:15px;color:var(--muted);font-weight:500;">${viewTitle()}</h2>
    ${kpisHtml({ total: bets.length, settled: settled.length, pending,
                 won, lost, pnlMoney, stakeMoney, roi, hit, totalPlanned, bets })}
    ${showDailyHistory ? daysHtml() : ""}
    ${tableHtml(bets)}
  `;
  attachFilters();
  renderRows();
}

function kpisHtml(d) {
  const next = d.bets.filter(b => b.status === "pending")
    .sort((a, b) => (a.kickoff_utc||"").localeCompare(b.kickoff_utc||""))[0];
  const nextHtml = next
    ? `<div style="font-size:13px;line-height:1.3">${next.home}<br><span style="color:var(--muted)">vs</span> ${next.away}<div class="sub">${fmtDate(next.kickoff_utc)}</div></div>`
    : "—";

  return `<div class="kpi-grid">
    <div class="kpi">
      <div class="label">Banca planejada</div>
      <div class="value">${fmtMoneyPlain(d.totalPlanned)}</div>
      <div class="sub">${d.total} entradas × R$${STAKE}</div>
    </div>
    <div class="kpi">
      <div class="label">Resolvidas</div>
      <div class="value">${d.settled} <span style="font-size:14px;color:var(--muted)">/ ${d.total}</span></div>
      <div class="sub">${d.pending} pendentes</div>
    </div>
    <div class="kpi">
      <div class="label">Hit rate</div>
      <div class="value">${d.settled ? (100*d.hit).toFixed(1)+"%" : "—"}</div>
      <div class="sub">${d.won} W / ${d.lost} L</div>
    </div>
    <div class="kpi">
      <div class="label">Lucro / Prejuízo</div>
      <div class="value ${cls(d.pnlMoney)}">${d.settled ? fmtMoney(d.pnlMoney) : "—"}</div>
      <div class="sub">apostado: ${fmtMoneyPlain(d.stakeMoney)}</div>
    </div>
    <div class="kpi">
      <div class="label">ROI</div>
      <div class="value ${cls(d.pnlMoney)}">${d.settled ? fmtPct(d.roi) : "—"}</div>
      <div class="sub">retorno sobre apostado</div>
    </div>
    <div class="kpi">
      <div class="label">Próximo jogo</div>
      <div class="value" style="font-size:13px;">${nextHtml}</div>
    </div>
  </div>`;
}

function daysHtml() {
  const byDay = {};
  allBets.filter(b => b.is_top10 && b.top10_day).forEach(b => {
    const d = b.top10_day;
    const o = byDay[d] = byDay[d] || { n:0, won:0, lost:0, pending:0, pnl:0, stake:0 };
    o.n++;
    if (b.status === "won") { o.won++; o.pnl += moneyOf(b); o.stake += STAKE; }
    else if (b.status === "lost") { o.lost++; o.pnl += moneyOf(b); o.stake += STAKE; }
    else { o.pending++; }
  });
  const days = Object.entries(byDay).sort((a, b) => a[0].localeCompare(b[0]));
  if (!days.length) return "";
  const cards = days.map(([d, o]) => {
    const settled = o.won + o.lost;
    const roi = o.stake ? o.pnl / o.stake : null;
    return `<div class="day-card">
      <div class="date">${fmtDayLabel(d)}</div>
      <div class="row"><span>entradas:</span><span>${o.n}</span></div>
      <div class="row"><span>resolvidas:</span><span>${settled} (${o.won}W/${o.lost}L)</span></div>
      <div class="row"><span>pendentes:</span><span>${o.pending}</span></div>
      <div class="row"><span>apostado:</span><span>${fmtMoneyPlain(o.stake)}</span></div>
      <div class="row"><span>P&L:</span><span class="pnl ${cls(o.pnl)}">${settled ? fmtMoney(o.pnl) : "—"}</span></div>
      <div class="row"><span>ROI:</span><span class="${cls(o.pnl)}">${settled && o.stake ? fmtPct(roi) : "—"}</span></div>
    </div>`;
  }).join("");
  return `<div class="panel">
    <h2>📅 Histórico diário (Top 10)</h2>
    <div class="day-grid">${cards}</div>
  </div>`;
}

function tableHtml(bets) {
  const ligas = [...new Set(bets.map(b => b.league_name))].sort();
  return `<div class="panel">
    <h2>📋 Entradas (${bets.length})</h2>
    <div class="filters">
      <select id="f-status">
        <option value="">Todos status</option>
        <option value="pending">Pendentes</option>
        <option value="won">Won</option>
        <option value="lost">Lost</option>
      </select>
      <select id="f-liga">
        <option value="">Todas ligas</option>
        ${ligas.map(l => `<option value="${l}">${l}</option>`).join("")}
      </select>
      <select id="f-market">
        <option value="">Todos mercados</option>
        <option value="home">Home</option>
        <option value="draw">Draw</option>
        <option value="away">Away</option>
      </select>
      <input id="f-q" placeholder="buscar time..." />
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead><tr>
          <th>Status</th>
          <th>Liga</th>
          <th>Kickoff</th>
          <th>Jogo</th>
          <th>Mercado</th>
          <th class="num">Odd</th>
          <th class="num">Stake</th>
          <th>Resultado</th>
          <th class="num">P&L</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>`;
}

function renderRows() {
  const bets = getViewBets();
  const fs = document.getElementById("f-status").value;
  const fl = document.getElementById("f-liga").value;
  const fm = document.getElementById("f-market").value;
  const fq = document.getElementById("f-q").value.toLowerCase().trim();
  const filtered = bets.filter(b => {
    if (fs && b.status !== fs) return false;
    if (fl && b.league_name !== fl) return false;
    if (fm && b.market !== fm) return false;
    if (fq && !(`${b.home} ${b.away}`).toLowerCase().includes(fq)) return false;
    return true;
  }).sort((a, b) => (a.kickoff_utc || "").localeCompare(b.kickoff_utc || ""));

  const tbody = document.getElementById("tbody");
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="9" class="empty">Nenhuma entrada com esses filtros.</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(b => {
    const pillClass = "pill pill-" + b.status;
    const pillTxt = b.status === "pending" ? "PEND" : b.status === "won" ? "WON" : "LOST";
    const result = b.outcome ? `${b.result_home}x${b.result_away} (${b.outcome})` : "—";
    const m = moneyOf(b);
    const star = b.is_top10 ? '<span class="star">★</span>' : '';
    return `<tr>
      <td><span class="${pillClass}">${pillTxt}</span></td>
      <td>${star}${b.league_name}</td>
      <td>${fmtDate(b.kickoff_utc)}</td>
      <td>${b.home} <span style="color:var(--muted)">vs</span> ${b.away}</td>
      <td>${b.market}</td>
      <td class="num">${fmtOdd(b.odd_entry)}</td>
      <td class="num">${fmtMoneyPlain(STAKE)}</td>
      <td>${result}</td>
      <td class="num ${cls(m)}">${b.status === 'pending' ? '—' : fmtMoney(m)}</td>
    </tr>`;
  }).join("");
}

function attachFilters() {
  ["f-status","f-liga","f-market","f-q"].forEach(id => {
    document.getElementById(id).addEventListener("input", renderRows);
  });
}

load();
setInterval(load, 60_000);
</script>
</body>
</html>
